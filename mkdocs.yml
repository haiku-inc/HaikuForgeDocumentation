site_name: Haiku Forge Documentation
site_url: https://haiku-inc.github.io/HaikuForgeDocumentation/

theme:
  name: material
  logo: assets/haiku-logo.png
  favicon: assets/haiku-logo.png
  font:
    text: Cairo
    code: Inconsolata
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - navigation.top
  # Use built-in scheme names (slate / default) so the palette toggle and
  # localStorage work reliably. First entry = default for new visitors.
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

extra_css:
  - stylesheets/haiku.css

extra:
  generator: false

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Haiku Commands: haiku-commands.md
  - Kusto Query Language: kusto-query-language.md
  - Multiplayer: multiplayer.md
  - Story Creation with Miniscript: story-creation-with-miniscript.md
  - Service Commands & Feedbacks: service-commands-and-feedbacks.md
  - Web Sites Creation:
      - Overview: web-sites-creation.md
      - Miniscript for Web Browser: web-sites-creation/miniscript-for-web-browser.md
